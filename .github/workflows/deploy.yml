name: Deploy

# 每当 push 到 master 分支时执行工作流
on:
  push: 
    branches: 
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest # 运行所需要的虚拟机环境（必填）
    permissions:
      contents: write # 允许 GITHUB_TOKEN 推送到 gh-pages 分支
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20 # Docusaurus 3 要求 Node.js >= 20

      - run: npm install

      - name: Build
        run: npm run build

      # 查看 workflow 的文档来获取更多信息
      # @see https://github.com/crazy-max/ghaction-github-pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # Actions 自带，无需手动配置；配合上方 permissions 即可推送
          publish_dir: build # Docusaurus 构建产物目录